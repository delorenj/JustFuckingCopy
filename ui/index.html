<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JustFuckingCopy</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <div class="app-shell">

      <section class="hero-card">
        <p class="eyebrow">Ambient Tray</p>
        <h1>JustFuckingCopy</h1>

        <div class="action-row">
          <button id="process-now-button" class="primary-button">Process Now</button>
          <button id="clear-batch-button" class="ghost-button">Clear Batch</button>
        </div>

        <div class="status-row">
          <div class="status-pill">
            <span class="status-label">Pending</span>
            <strong id="pending-count">0</strong>
          </div>
          <div class="status-pill">
            <span class="status-label">Processed</span>
            <strong id="segment-count">0</strong>
          </div>
          <div class="status-pill">
            <span class="status-label">Clipboard</span>
            <strong id="clipboard-status">Waiting</strong>
          </div>
        </div>
      </section>

      <section class="workspace-grid status-workspace">

        <article class="panel pending-panel">
          <div class="panel-header">
            <div>
              <p class="panel-kicker">Batch Queue</p>
              <h2>Pending screenshots</h2>
            </div>
          </div>
          <div id="pending-list" class="segment-list">
            <p class="empty-state">No screenshots pending.</p>
          </div>
        </article>

        <article class="panel output-panel">
          <div class="panel-header">
            <div>
              <p class="panel-kicker">Merged Output</p>
              <h2>Clipboard-bound text</h2>
            </div>
          </div>
          <textarea
            id="merged-output"
            class="merged-output"
            spellcheck="false"
            readonly
            placeholder="Process a batch to see merged text here."
          ></textarea>
        </article>

      </section>

      <section class="panel segment-panel">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Session Timeline</p>
            <h2>Processed batches</h2>
          </div>
        </div>
        <div id="segment-list" class="segment-list">
          <p class="empty-state">No OCR slices yet.</p>
        </div>
      </section>

      <aside id="flash-banner" class="flash-banner" hidden></aside>
    </div>
  </body>
</html>
