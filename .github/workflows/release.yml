name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      tag_name: ${{ steps.tag.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.tag.outputs.name }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `JustFuckingCopy ${tag}`,
              body: 'Automated release build. Artifacts attached below.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    name: Build ${{ matrix.label }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-x86_64
            rust-targets: x86_64-unknown-linux-gnu
            args: ''
          - os: macos-14
            label: macos-universal
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.label }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            build-essential \
            file \
            wget

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri bundle
        env:
          CI: true
        working-directory: ./src-tauri
        run: cargo tauri build ${{ matrix.args }}

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          find src-tauri/target -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -exec cp {} dist/ \;
          ls -lh dist/

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          # DMG output (universal target places bundles under universal-apple-darwin/release/bundle)
          find src-tauri/target -type f -name "*.dmg" -exec cp {} dist/ \;
          # Rename dmgs to include universal suffix
          for f in dist/*.dmg; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .dmg)
            mv "$f" "dist/${base}-universal.dmg"
          done
          # Zip the .app bundle too
          APP_PATH=$(find src-tauri/target -type d -name "*.app" | head -n 1)
          if [ -n "$APP_PATH" ]; then
            APP_NAME=$(basename "$APP_PATH" .app)
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/${APP_NAME}-universal.app.zip"
          fi
          ls -lh dist/

      - name: Upload to release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = ${{ needs.create-release.outputs.release_id }};
            const dir = 'dist';
            for (const file of fs.readdirSync(dir)) {
              const filePath = path.join(dir, file);
              console.log(`Uploading ${filePath}`);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: file,
                data: fs.readFileSync(filePath),
              });
            }

  publish-release:
    name: Publish release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as published
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
